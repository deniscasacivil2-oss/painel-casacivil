<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Integrado - Casa Civil</title>
  
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/3/30/Bras%C3%A3o_de_Ol%C3%ADmpia%2C_SP.jpg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] },
          colors: { navy: '#003366', gold: '#ffb800' }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
    body { background-color: #f8fafc; color: #1e293b; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <!-- React libraries sem Babel para evitar erros de import -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    const e = React.createElement;
    const { useState, useEffect } = React;

    // --- Ícones em formato React.createElement ---
    const IconDashboard = ({ size = 24, className = '' }) => e('svg', { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className },
      e('rect', { x: 3, y: 3, width: 7, height: 9, rx: 1 }), e('rect', { x: 14, y: 3, width: 7, height: 5, rx: 1 }), e('rect', { x: 14, y: 12, width: 7, height: 9, rx: 1 }), e('rect', { x: 3, y: 16, width: 7, height: 5, rx: 1 })
    );
    const IconChart = ({ size = 24, className = '' }) => e('svg', { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className },
      e('path', { d: "M3 3v18h18" }), e('rect', { x: 7, y: 13, width: 4, height: 4, rx: 1 }), e('rect', { x: 15, y: 5, width: 4, height: 12, rx: 1 })
    );
    const IconArrowRight = ({ size = 24, className = '' }) => e('svg', { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className },
      e('line', { x1: 5, y1: 12, x2: 19, y2: 12 }), e('polyline', { points: "12 5 19 12 12 19" })
    );
    const IconAlert = ({ size = 24, className = '' }) => e('svg', { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className },
      e('circle', { cx: 12, cy: 12, r: 10 }), e('line', { x1: 12, y1: 8, x2: 12, y2: 12 }), e('line', { x1: 12, y1: 16, x2: 12.01, y2: 16 })
    );
    const IconX = ({ size = 24, className = '' }) => e('svg', { xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", className },
      e('line', { x1: 18, y1: 6, x2: 6, y2: 18 }), e('line', { x1: 6, y1: 6, x2: 18, y2: 18 })
    );

    // --- Componentes ---
    function Header() {
      return e('header', { className: "bg-navy border-b border-navy h-24 flex items-center justify-between px-6 lg:px-10 z-30 shadow-sm relative" },
        e('div', { className: "absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gold via-gold to-white" }),
        e('div', { className: "flex flex-col justify-center" },
          e('h1', { className: "text-xl font-black text-white uppercase tracking-tight" }, "Painel Integrado"),
          e('p', { className: "text-xs font-bold text-slate-300 uppercase tracking-widest hidden sm:block" }, "Secretaria Municipal da Casa Civil")
        ),
        e('div', { className: "h-16 bg-white rounded-lg shadow-sm border border-slate-100 p-1 flex items-center justify-center" },
          e('img', { src: "https://e-licita.olimpia.sp.gov.br:8096/img/logo.png", alt: "Brasão", className: "h-full w-auto object-contain" })
        )
      );
    }

    function Footer() {
      return e('footer', { className: "bg-navy border-t-[3px] border-gold py-5 px-6 mt-12 text-center" },
        e('p', { className: "text-white text-xs font-bold uppercase tracking-widest" }, "SECRETARIA MUNICIPAL DA CASA CIVIL • OLÍMPIA, SP")
      );
    }

    function Toast({ message, onClose }) {
      if (!message) return null;
      return e('div', { className: "fixed bottom-6 right-6 bg-slate-900 border border-slate-700 shadow-2xl rounded-lg p-4 z-[60] flex items-start max-w-sm animate-fadeIn" },
        e(IconAlert, { size: 20, className: "text-gold mr-3 mt-0.5 flex-shrink-0" }),
        e('div', { className: "text-white text-sm font-medium" }, message),
        e('button', { onClick: onClose, className: "ml-4 text-slate-400 hover:text-white transition-colors cursor-pointer" },
          e(IconX, { size: 16 })
        )
      );
    }

    function TitleSection({ title, subtitle, showBack, onBack }) {
      return e('div', { className: "mb-10 flex flex-col gap-3" },
        showBack ? e('button', { onClick: onBack, className: "self-start flex items-center gap-2 text-slate-500 font-bold hover:text-navy transition-colors bg-white px-5 py-2.5 rounded-full border border-slate-200 shadow-sm hover:shadow-md cursor-pointer mb-4" }, "← Voltar para Divisões") : null,
        e('h2', { className: "text-3xl md:text-4xl font-black text-navy uppercase tracking-tighter" }, title),
        e('p', { className: "text-slate-600 text-base font-medium leading-relaxed max-w-3xl" }, subtitle)
      );
    }

    function NavyCard({ title, onClick, icon, href, showToast, isMaint, hasNoLink }) {
      const handleInteraction = (ev) => {
        if (isMaint || hasNoLink) {
          ev.preventDefault();
          if(showToast) showToast(isMaint ? "Este painel está em manutenção no momento." : "Este painel ainda não possui um link associado.");
          return;
        }
        if (onClick) {
          ev.preventDefault();
          onClick();
        }
      };

      const Content = [
        // Efeito: Degradê dourado no canto superior esquerdo (Glow effect)
        e('div', { key: 'glow', className: "absolute -top-16 -left-16 w-56 h-56 bg-gold rounded-full blur-3xl opacity-0 group-hover:opacity-20 transition-all duration-700 pointer-events-none z-0" }),
        // Faixa dourada lateral
        e('div', { key: 'stripe', className: "absolute left-0 top-0 bottom-0 w-0 group-hover:w-3 bg-gold transition-all duration-300 z-0" }),
        // Ícone Superior
        e('div', { key: 'top', className: "w-12 h-12 md:w-14 md:h-14 rounded-xl border border-white/20 group-hover:border-gold/50 bg-white/5 flex items-center justify-center relative z-10 transition-colors duration-300" },
          icon
        ),
        // Textos e Seta
        e('div', { key: 'bottom', className: "flex items-end justify-between mt-4 gap-4 relative z-10" },
          e('div', { className: "flex flex-col" },
             isMaint ? e('span', { className: "text-orange-400 text-[10px] uppercase font-bold tracking-widest mb-1" }, "Manutenção") : null,
             e('h3', { className: "text-white group-hover:text-gold font-bold text-lg md:text-xl leading-tight max-w-[95%] transition-colors duration-300" }, title.replace(/\[manutenção\]/i, '').trim())
          ),
          e('div', { className: "w-10 h-10 rounded-full bg-white/10 flex items-center justify-center flex-shrink-0 group-hover:bg-gold transition-colors duration-300" },
            e(IconArrowRight, { size: 20, className: "text-gold group-hover:text-navy transition-colors duration-300" })
          )
        )
      ];

      const commonClasses = "bg-navy rounded-3xl p-6 md:p-8 flex flex-col justify-between h-56 md:h-64 cursor-pointer hover:bg-[#002244] transition-all shadow-lg hover:shadow-2xl hover:-translate-y-1 group relative overflow-hidden block decoration-none";

      if (href) {
        return e('a', { 
          href: (isMaint || hasNoLink) ? "#" : href, 
          target: (isMaint || hasNoLink) ? "_self" : "_blank", 
          onClick: handleInteraction, 
          className: commonClasses 
        }, Content);
      }

      return e('div', { 
        onClick: handleInteraction, 
        className: commonClasses 
      }, Content);
    }

    function App() {
      const [categories, setCategories] = useState([]);
      const [links, setLinks] = useState([]);
      const [activeCategory, setActiveCategory] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [toastMsg, setToastMsg] = useState(null);

      const triggerToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(null), 4000);
      };

      useEffect(() => {
        fetch("https://script.google.com/macros/s/AKfycbx_k4XYcG6PdFEFlAv-F41SF1lX9iS77Vk3aMem0BSRN5CR0Gi9yweiuXL3GRu1vPSebA/exec")
          .then(res => res.json())
          .then(data => {
            const rows = data.data || data;
            const cats = [];
            const lks = [];
            if (rows && rows[0]) {
              rows[0].forEach((h, idx) => {
                const label = String(h).trim();
                if (!label) return;
                const id = label.toLowerCase().replace(/[^a-z0-9]/g, "-");
                cats.push({ id, label });
                for (let i = 1; i < rows.length; i++) {
                  if (rows[i][idx]) {
                    const cell = String(rows[i][idx]).trim();
                    const urlMatch = cell.match(/(https?:\/\/[^\s]+)/);
                    lks.push({ id: `${idx}-${i}`, title: urlMatch ? cell.replace(urlMatch[1], "").trim() : cell, category: id, url: urlMatch ? urlMatch[1] : "#" });
                  }
                }
              });
            }
            setCategories(cats);
            setLinks(lks);
            setIsLoading(false);
          });
      }, []);

      let MainContent;

      if (isLoading) {
        MainContent = e('div', { className: "text-navy font-bold text-center py-20 animate-fadeIn" }, "Carregando dados...");
      } else if (!activeCategory) {
        MainContent = e('div', { className: "animate-fadeIn" },
          e(TitleSection, { 
            title: "DIVISÕES", 
            subtitle: "Selecione a área desejada abaixo para acessar os respectivos observatórios e relatórios gerenciais.",
            showBack: false
          }),
          e('div', { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" },
            categories.map(c => e(NavyCard, { 
              key: c.id, 
              title: c.label, 
              onClick: () => setActiveCategory(c.id),
              icon: e(IconDashboard, { size: 24, className: "text-white group-hover:text-gold transition-colors duration-300" })
            }))
          )
        );
      } else {
        const catObj = categories.find(c => c.id === activeCategory);
        const filteredLinks = links.filter(l => l.category === activeCategory);
        
        MainContent = e('div', { className: "animate-fadeIn" },
          e(TitleSection, { 
            title: catObj ? catObj.label : "Painéis", 
            subtitle: "Selecione o painel que deseja visualizar. O relatório abrirá em uma nova janela.",
            showBack: true,
            onBack: () => setActiveCategory(null)
          }),
          filteredLinks.length > 0 ? (
            e('div', { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" },
              filteredLinks.map(l => e(NavyCard, { 
                key: l.id, 
                title: l.title, 
                href: l.url,
                showToast: triggerToast,
                isMaint: l.title.toLowerCase().includes("[manutenção]"),
                hasNoLink: !l.url || l.url === "#",
                icon: e(IconChart, { size: 24, className: l.title.toLowerCase().includes("[manutenção]") ? "text-orange-400" : "text-white group-hover:text-gold transition-colors duration-300" })
              }))
            )
          ) : (
             e('div', { className: "bg-white rounded-3xl border border-slate-200 p-16 text-center shadow-sm" },
                e('h3', { className: "text-2xl font-bold text-navy mb-3" }, "Nenhum painel disponível"),
                e('p', { className: "text-slate-500 text-base max-w-md mx-auto" }, "Não há relatórios cadastrados para esta divisão no momento.")
             )
          )
        );
      }

      return e('div', { className: "flex flex-col min-h-screen" },
        e(Header),
        e('main', { className: "flex-grow p-6 md:p-10 max-w-7xl mx-auto w-full" }, MainContent),
        e(Footer),
        e(Toast, { message: toastMsg, onClose: () => setToastMsg(null) })
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(App));
  </script>
</body>
</html>
